name: Deploy ShopTogether

on:
  push:
    branches: [main]

# ─────────────────────────────────────────────────────────────────────────────
# SECRETS requeridos en GitHub → Settings → Secrets → Actions:
#
#   SSH_HOST          → IP o hostname del servidor  (ej: jpurrac.cl)
#   SSH_USER          → Usuario SSH                 (ej: jpurrac)
#   SSH_PRIVATE_KEY   → Clave privada SSH (contenido del archivo ~/.ssh/id_rsa)
#
#   VITE_API_URL      → URL del backend en prod     (https://api-shop.jpurrac.cl/api)
# ─────────────────────────────────────────────────────────────────────────────

jobs:

  # ── TESTS BACKEND ────────────────────────────────────────────────────────────
  test-backend:
    name: Tests Backend (PHP 8.3)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: shoptogether_test
          MYSQL_USER: shoptogether
          MYSQL_PASSWORD: secret
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_mysql, bcmath, mbstring

      - name: Instalar dependencias Composer
        run: |
          cd backend
          composer install --no-interaction --prefer-dist --no-progress

      - name: Crear .env.testing
        run: |
          cat > backend/.env.testing << 'EOF'
          APP_NAME=ShopTogether
          APP_ENV=testing
          APP_KEY=
          APP_DEBUG=true
          APP_URL=http://localhost
          DB_CONNECTION=mysql
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_DATABASE=shoptogether_test
          DB_USERNAME=shoptogether
          DB_PASSWORD=secret
          BROADCAST_CONNECTION=log
          CACHE_STORE=array
          SESSION_DRIVER=array
          QUEUE_CONNECTION=sync
          MAIL_MAILER=array
          EOF
          cd backend && php artisan key:generate --env=testing

      - name: Ejecutar migraciones de test
        run: cd backend && php artisan migrate --env=testing --force

      - name: Correr tests
        run: cd backend && php artisan test --env=testing

  # ── DEPLOY FRONTEND ──────────────────────────────────────────────────────────
  deploy-frontend:
    name: Frontend → shop.jpurrac.cl
    runs-on: ubuntu-latest
    needs: test-backend

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detectar cambios en frontend/
        id: check
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^frontend/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node 20
        if: steps.check.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        if: steps.check.outputs.changed == 'true'
        run: cd frontend && npm ci

      - name: Build producción
        if: steps.check.outputs.changed == 'true'
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_APP_NAME: ShopTogether
          VITE_SOCKET_ENABLED: 'false'
        run: npm run build

      - name: Deploy via SCP → /public_html/shop/
        if: steps.check.outputs.changed == 'true'
        uses: appleboy/scp-action@master
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          source:   "frontend/dist/*"
          target:   "public_html/shop/"
          strip_components: 2

      - name: Sin cambios
        if: steps.check.outputs.changed == 'false'
        run: echo "Sin cambios en frontend/, deploy omitido."

  # ── DEPLOY BACKEND ───────────────────────────────────────────────────────────
  deploy-backend:
    name: Backend → api-shop.jpurrac.cl
    runs-on: ubuntu-latest
    needs: test-backend

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detectar cambios en backend/
        id: check
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^backend/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Subir archivos via SCP → /public_html/api-shop/
        if: steps.check.outputs.changed == 'true'
        uses: appleboy/scp-action@master
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          source:   "backend/"
          target:   "public_html/"
          strip_components: 1
          # vendor/, .env y logs se excluyen via .scpignore (ver abajo)

      - name: Composer + Migrate + Optimize (SSH)
        if: steps.check.outputs.changed == 'true'
        uses: appleboy/ssh-action@master
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ~/public_html/api-shop

            echo "── Composer install ──"
            php8.3 composer.phar install --no-dev --optimize-autoloader --no-interaction

            echo "── Migraciones ──"
            php8.3 artisan migrate --force

            echo "── Cache ──"
            php8.3 artisan optimize:clear
            php8.3 artisan optimize

            echo "── Permisos ──"
            chmod -R 775 storage bootstrap/cache

            echo "✓ Backend desplegado correctamente"

      - name: Sin cambios
        if: steps.check.outputs.changed == 'false'
        run: echo "Sin cambios en backend/, deploy omitido."

